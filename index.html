<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Poppins:400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <title>Geto - Artist, album and track exploration Here</title>
</head>
<body>
    <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        function Header() {
                return <div className="topcontent"><span className="name">Geto <span className="emoji">&#9889;</span></span></div>
        }

        class WorkComponent extends React.Component {
                constructor() {
                    super()
                    this.state = {
                        apiKey: "40435b0af7d9d884b64fd112db6c2118",
                        search: "", 
                        imgUrl: "",
                        artistBio: ""
                    }
                    this.handleChange = this.handleChange.bind(this);
                    this.handleClick = this.handleClick.bind(this);
                }
                handleChange(event) {
                    this.setState({ search: event.target.value })
                }
                handleClick() {
                    var url = "https://ws.audioscrobbler.com/2.0/?method=artist.getinfo&artist=" + this.state.search + "&api_key=" + this.state.apiKey + "&format=json";
                    fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        this.setState({ artistBio: data.artist.bio.summary })
                    })
                }
                render() {
                    return (
                        <div className="searchbar">
                            <span><input 
                                    className="searchspace"
                                    type="text" 
                                    name="search" 
                                    value={this.state.search} 
                                    placeholder="Type an artist or track name" 
                                    onChange={this.handleChange} 
                            /></span>
                            <span><button className="searchbutton" onClick={this.handleClick}><img src="search.svg" alt="Search" /></button></span>
                            <div className="searchresults">
                                <br />
                                <h3>{this.state.search}</h3>
                                <img src={this.state.imgUrl} alt="artist image"/>
                                <p>{this.state.artistBio}</p>
                            </div>
                        </div>
                    )
                }
        }

        function App() {
            return (
                <div>
                    <Header />
                    <WorkComponent />
                </div>
            )
        }
        ReactDOM.render(<App />, document.getElementById("root"))
    </script>

    <div id="root"></div>
</body>
</html>
